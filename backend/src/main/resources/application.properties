# ─── Servidor ────────────────────────────────────────────────────────────────
server.port=8080

# ─── Banco de dados (H2 em memória para dev) ─────────────────────────────────
spring.datasource.url=jdbc:h2:mem:extensflow
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ─── H2 Console (APENAS dev – desabilitar em produção) ───────────────────────
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Em produção, use variável de ambiente: JWT_SECRET=<string-aleatoria-256bits>
app.jwt.secret=${JWT_SECRET:3f8b2c1d4e5a6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d}
app.jwt.expiration-ms=86400000

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Seed de dados demo (APENAS dev) ─────────────────────────────────────────
app.seed.enabled=${SEED_ENABLED:false}
app.seed.senha=${SEED_SENHA:dev_senha_local_123}
